[workspace]
resolver = "3"
members = ["crates/cli", "crates/core", "crates/index", "crates/ingest"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
tantivy = "0.26.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

nix-search-core = { path = "crates/core" }
nix-search-ingest = { path = "crates/ingest" }
nix-search-index = { path = "crates/index" }
