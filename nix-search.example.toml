[data]
artifact_url = "file://./data/artifacts"
index_dir = "./data/indexes"

[server]
listen = "127.0.0.1:3000"
bootstrap = true

[server.schedule]
enabled = false
interval = "24h"

[sources.nixpkgs]
name = "Nixpkgs"
preset = "nixpkgs-packages"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-25.11"]

[sources.nixos]
name = "NixOS"
preset = "nixos-options"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-25.11"]

[sources.home-manager]
name = "Home Manager"
preset = "home-manager-options"
default_ref = "master"
preset_refs = ["master", "release-25.11"]

[sources.darwin]
name = "nix-darwin"
preset = "nix-darwin-options"
default_ref = "master"
preset_refs = ["master", "nix-darwin-25.11"]

[sources.hjem]
name = "Hjem"
preset = "hjem-options"
default_ref = "main"
preset_refs = ["main"]

[sources.hjem-rum]
name = "Hjem Rum"
preset = "hjem-rum-options"
default_ref = "main"
preset_refs = ["main"]

[sources.fixtures]
name = "Fixture"
kind = "options"

[sources.fixtures.refs.small.producer]
type = "existing-file"
path = "fixtures/search-small/options.json"
artifact = "options-json"

[sources.eval-fixture]
name = "Eval-Fixture"
kind = "options"

[sources.eval-fixture.refs.local.source_links]
type = "prefix"
url_prefix = "https://example.com/blob/main/"

[sources.eval-fixture.refs.local.producer]
type = "eval-modules"
ref = "path:./fixtures/eval-modules-flake"

[[sources.eval-fixture.refs.local.producer.modules]]
type = "flake-attr"
attr = "nixosModules.default"
