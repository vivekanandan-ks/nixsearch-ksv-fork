[data]
artifact_url = "file://./data/artifacts"
index_dir = "./data/indexes"

[server]
listen = "127.0.0.1:3000"

[sources.nixpkgs]
name = "Nixpkgs"
preset = "nixpkgs-packages"
ref = "nixos-unstable"

[sources.nixos]
name = "NixOS Options"
preset = "nixos-options"
ref = "nixos-unstable"

[sources.fixtures]
name = "Fixtures"
kind = "options"

[[sources.fixtures.refs]]
id = "small"

[sources.fixtures.refs.producer]
type = "existing-file"
path = "fixtures/options-small.json"
artifact = "options-json"

[sources.eval-fixture]
name = "Eval Modules Fixture"
kind = "options"

[[sources.eval-fixture.refs]]
id = "local"

[sources.eval-fixture.refs.source_links]
type = "prefix"
url_prefix = "https://example.com/blob/main/"

[sources.eval-fixture.refs.producer]
type = "eval-modules"
ref = "path:./fixtures/eval-modules-flake"
modules_attr = "nixosModules.default"
