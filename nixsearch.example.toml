[data]
artifact_url = "file://./data/artifacts"
index_dir = "./data/indexes"

[server]
listen = "127.0.0.1:3000"
# Required for public SEO. If unset, pages intentionally emit noindex and sitemap.xml is disabled.
public_url = "https://nixsearch.example.com"
bootstrap = true

[server.schedule]
enabled = false
interval = "24h"

[maintenance.index_generations]
keep = 3
delete_failed_after = "24h"

[maintenance.nix_store]
gc = false
optimise = false

[server.analytics_script]
enabled = false
# src = "https://rybbit.example.com/api/script.js"

[server.analytics_script.attributes]
# data-site-id = ""
defer = true

[ref_sets.unstable]
nixpkgs = ["nixos-unstable"]
nixos = ["nixos-unstable"]
home-manager = ["master"]
darwin = ["master"]
hjem = ["main"]
hjem-rum = ["main"]
nur = ["main"]

[ref_sets."26.05"]
nixpkgs = ["nixos-26.05"]
nixos = ["nixos-26.05"]
home-manager = ["release-26.05"]
darwin = ["nix-darwin-26.05"]
hjem = ["main"]
hjem-rum = ["main"]
nur = ["main"]

[ref_sets."25.11"]
nixpkgs = ["nixos-25.11"]
nixos = ["nixos-25.11"]
home-manager = ["release-25.11"]
darwin = ["nix-darwin-25.11"]
hjem = ["main"]
hjem-rum = ["main"]
nur = ["main"]

[sources.nixpkgs]
preset = "nixpkgs-packages"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-26.05", "nixos-25.11"]

[sources.nixos]
preset = "nixos-options"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-26.05", "nixos-25.11"]

# Flake-backed sources retry failed pure builds with:
# fallback_inputs = { nixpkgs = "github:NixOS/nixpkgs/nixpkgs-unstable" }
# Set fallback_inputs = {} on a flake-file producer to disable this.

[sources.home-manager]
preset = "home-manager-options"
default_ref = "master"
preset_refs = ["master", "release-26.05", "release-25.11"]

[sources.darwin]
preset = "nix-darwin-options"
default_ref = "master"
preset_refs = ["master", "nix-darwin-26.05", "nix-darwin-25.11"]

[sources.hjem]
preset = "hjem-options"
default_ref = "main"
preset_refs = ["main"]

[sources.hjem-rum]
preset = "hjem-rum-options"
default_ref = "main"
preset_refs = ["main"]

[sources.nur]
preset = "nur-packages"
default_ref = "main"
preset_refs = ["main"]
