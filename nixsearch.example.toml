[data]
artifact_url = "file://./data/artifacts"
index_dir = "./data/indexes"

[server]
listen = "127.0.0.1:3000"
# public_url = "https://nixsearch.example.com"
bootstrap = true

[server.schedule]
enabled = false
interval = "24h"

[server.analytics_script]
enabled = false
# src = "https://rybbit.example.com/api/script.js"

[server.analytics_script.attributes]
# data-site-id = ""
defer = true

[ref_sets.unstable]
nixpkgs = ["nixos-unstable"]
nixos = ["nixos-unstable"]
home-manager = ["master"]
darwin = ["master"]
hjem = ["main"]
hjem-rum = ["main"]
fixtures = ["small"]
eval-fixture = ["local"]

[ref_sets."25.11"]
nixpkgs = ["nixos-25.11"]
nixos = ["nixos-25.11"]
home-manager = ["release-25.11"]
darwin = ["nix-darwin-25.11"]
hjem = ["main"]
hjem-rum = ["main"]
fixtures = ["small"]
eval-fixture = ["local"]

[sources.nixpkgs]
preset = "nixpkgs-packages"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-25.11"]

[sources.nixos]
preset = "nixos-options"
default_ref = "nixos-unstable"
preset_refs = ["nixos-unstable", "nixos-25.11"]

[sources.home-manager]
preset = "home-manager-options"
default_ref = "master"
preset_refs = ["master", "release-25.11"]

[sources.darwin]
preset = "nix-darwin-options"
default_ref = "master"
preset_refs = ["master", "nix-darwin-25.11"]

[sources.hjem]
preset = "hjem-options"
default_ref = "main"
preset_refs = ["main"]

[sources.hjem-rum]
preset = "hjem-rum-options"
default_ref = "main"
preset_refs = ["main"]

[sources.fixtures]
name = "Fixture"
kind = "options"

[sources.fixtures.refs.small.producer]
type = "existing-file"
path = "fixtures/search-small/options.json"
artifact = "options-json"

[sources.eval-fixture]
name = "Eval-Fixture"
kind = "options"

[sources.eval-fixture.refs.local.source_links]
type = "prefix"
url_prefix = "https://example.com/blob/main/"

[sources.eval-fixture.refs.local.producer]
type = "eval-modules"
ref = "path:./fixtures/eval-modules-flake"

[[sources.eval-fixture.refs.local.producer.modules]]
type = "flake-attr"
attr = "nixosModules.default"
